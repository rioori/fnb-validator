<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Roboto:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1128px;
    height: 191px;
    overflow: hidden;
    font-family: 'Roboto', sans-serif;
  }

  .banner {
    width: 1128px;
    height: 191px;
    background: linear-gradient(135deg,
      #FAF3E3 0%,
      #E5F4F8 30%,
      #D2ECD0 55%,
      #FDEEC4 80%,
      #FAF3E3 100%
    );
    position: relative;
    overflow: hidden;
  }

  /* Floating decorative shapes */
  .deco {
    position: absolute;
    border: 2px solid #2D3748;
    opacity: 0.07;
  }
  .deco-1 { width: 44px; height: 44px; top: -8px; left: 60px; background: #FDBCB4; border-radius: 12px; transform: rotate(15deg); }
  .deco-2 { width: 28px; height: 28px; top: 50px; left: 16px; background: #ADD8E6; border-radius: 50%; }
  .deco-3 { width: 22px; height: 22px; top: 14px; left: 160px; background: #D2ECD0; border-radius: 7px; transform: rotate(-10deg); }
  .deco-4 { width: 16px; height: 16px; bottom: 40px; left: 120px; background: #FDEEC4; border-radius: 50%; }
  .deco-5 { width: 32px; height: 32px; bottom: 20px; left: 30px; background: #E5F4F8; border-radius: 9px; transform: rotate(20deg); }

  /* ===== MAIN LAYOUT ===== */
  /* Center-right layout: text in center, illustration on right */
  /* Left ~200px is "dead zone" for avatar overlap */

  .text-block {
    position: absolute;
    left: 240px;
    top: 18px;
    z-index: 1;
  }

  .brand-name {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: #2D3748;
    letter-spacing: -0.5px;
    margin-bottom: 2px;
  }

  .tagline {
    font-family: 'Roboto', sans-serif;
    font-size: 12px;
    color: #64748B;
    font-weight: 400;
    line-height: 1.4;
    margin-bottom: 8px;
  }

  /* Category pills */
  .pill-row {
    display: flex;
    gap: 5px;
    margin-bottom: 6px;
  }

  .clay-pill {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 999px;
    border: 1.5px solid #2D3748;
    color: #2D3748;
    white-space: nowrap;
  }
  .clay-pill.mint { background: #D2ECD0; }
  .clay-pill.gold { background: #FDEEC4; }
  .clay-pill.blue { background: #E5F4F8; }
  .clay-pill.blush { background: #FDE8E4; }

  /* Feature pills */
  .feat-row {
    display: flex;
    gap: 5px;
  }

  .feat-pill {
    font-family: 'Roboto', sans-serif;
    font-size: 8.5px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid #CBD5E1;
    background: white;
    color: #475569;
    white-space: nowrap;
  }

  /* Illustration — anchored bottom-right */
  .illustration {
    position: absolute;
    right: 24px;
    bottom: 0;
    z-index: 1;
  }

  .shops-img {
    height: 178px;
    object-fit: contain;
  }

  /* Badges */
  .free-badge {
    position: absolute;
    top: 10px;
    right: 24px;
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 800;
    color: #2D3748;
    background: white;
    border: 2px solid #2D3748;
    border-radius: 999px;
    padding: 3px 12px;
    box-shadow: 2px 2px 0 #2D3748;
    z-index: 2;
  }

  .url-badge {
    position: absolute;
    bottom: 8px;
    right: 24px;
    z-index: 2;
  }

  .url-pill {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 700;
    color: white;
    background: #22C55E;
    border: 1.5px solid #2D3748;
    border-radius: 999px;
    padding: 3px 12px;
    box-shadow: 1.5px 1.5px 0 #16A34A;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="deco deco-1"></div>
    <div class="deco deco-2"></div>
    <div class="deco deco-3"></div>
    <div class="deco deco-4"></div>
    <div class="deco deco-5"></div>

    <!-- Text content — centered, avoids left avatar zone -->
    <div class="text-block">
      <div class="brand-name">validator.vn</div>
      <div class="tagline">Validate your business numbers before you invest.<br>Free AI-powered tool for Vietnam's SMEs.</div>
      <div class="pill-row">
        <span class="clay-pill mint">F&B</span>
        <span class="clay-pill gold">Retail</span>
        <span class="clay-pill blue">Education</span>
        <span class="clay-pill blush">Services</span>
      </div>
      <div class="feat-row">
        <span class="feat-pill">Financial Analysis</span>
        <span class="feat-pill">AI Advisor</span>
        <span class="feat-pill">Knowledge Library</span>
        <span class="feat-pill">Checklist</span>
      </div>
    </div>

    <!-- Illustration — bottom-right -->
    <div class="illustration">
      <img src="linkedin_image.png" class="shops-img" alt="Business verticals">
    </div>

    <span class="free-badge">100% FREE</span>
    <div class="url-badge"><span class="url-pill">www.validator.vn</span></div>
  </div>
</body>
</html>
