<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carousel — Problem</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Roboto', system-ui, sans-serif; background: #F8FAFC; position: relative; }
  .bg-canvas { position: absolute; inset: 0; background: radial-gradient(ellipse 700px 600px at 0% 0%, rgba(210,236,208,0.5) 0%, transparent 70%), radial-gradient(ellipse 600px 500px at 100% 100%, rgba(229,244,248,0.6) 0%, transparent 70%), radial-gradient(ellipse 450px 400px at 85% 8%, rgba(253,238,196,0.4) 0%, transparent 70%), radial-gradient(ellipse 400px 350px at 8% 85%, rgba(253,232,228,0.4) 0%, transparent 70%), #F8FAFC; }
  .bg-canvas::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle, rgba(15,23,42,0.035) 1px, transparent 1px); background-size: 24px 24px; }

  .deco { position: absolute; border-radius: 50%; opacity: 0.06; z-index: 0; }
  .deco-1 { width: 200px; height: 200px; background: #22C55E; bottom: -50px; right: 60px; }
  .deco-2 { width: 120px; height: 120px; background: #0F172A; top: 60px; left: -30px; }
  .deco-3 { width: 90px; height: 90px; background: #FBBF24; bottom: 180px; left: 80px; }

  .content {
    position: relative; z-index: 1;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 80px 80px;
  }

  .section-label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700; font-size: 16px;
    color: #16A34A;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .headline {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800; font-size: 46px;
    color: #0F172A;
    line-height: 1.25;
    letter-spacing: -0.5px;
    margin-bottom: 32px;
  }
  .headline span { color: #16A34A; }

  .divider {
    width: 60px; height: 3px;
    background: #22C55E; border-radius: 2px;
    margin-bottom: 32px;
  }

  .body-text {
    font-size: 22px; color: #475569;
    line-height: 1.6;
    max-width: 800px;
  }

  .brand-watermark {
    position: absolute;
    bottom: 36px; left: 48px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700; font-size: 16px;
    color: #CBD5E1;
  }
</style>
</head>
<body>
  <div class="bg-canvas"></div>
  <div class="deco deco-1"></div>
  <div class="deco deco-2"></div>
  <div class="deco deco-3"></div>
  <div class="content">
    <div class="section-label">The Problem</div>
    <div class="headline">Most F&B entrepreneurs <span>don't know</span> if their model works</div>
    <div class="divider"></div>
    <div class="body-text">They sign leases, invest savings, and open doors — without knowing when they'll break even, which costs are too high, or if the numbers make sense at all.</div>
  </div>
  <div class="brand-watermark">validator.vn</div>
</body>
</html>
