<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carousel — Quote</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&family=Roboto:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Roboto', system-ui, sans-serif; background: #F8FAFC; position: relative; }
  .bg-canvas { position: absolute; inset: 0; background: radial-gradient(ellipse 700px 600px at 0% 0%, rgba(210,236,208,0.5) 0%, transparent 70%), radial-gradient(ellipse 600px 500px at 100% 100%, rgba(229,244,248,0.6) 0%, transparent 70%), radial-gradient(ellipse 450px 400px at 85% 8%, rgba(253,238,196,0.4) 0%, transparent 70%), radial-gradient(ellipse 400px 350px at 8% 85%, rgba(253,232,228,0.4) 0%, transparent 70%), #F8FAFC; }
  .bg-canvas::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle, rgba(15,23,42,0.035) 1px, transparent 1px); background-size: 24px 24px; }

  .deco { position: absolute; border-radius: 50%; opacity: 0.06; z-index: 0; }
  .deco-1 { width: 200px; height: 200px; background: #22C55E; top: -50px; left: -40px; }
  .deco-2 { width: 150px; height: 150px; background: #0F172A; bottom: -30px; right: 100px; }

  .content {
    position: relative; z-index: 1;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 80px 90px;
  }

  .quote-mark {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900; font-size: 140px;
    color: #22C55E;
    line-height: 0.7;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .quote-text {
    font-family: 'Roboto', sans-serif;
    font-style: italic;
    font-size: 34px;
    color: #0F172A;
    line-height: 1.5;
    margin-bottom: 40px;
    max-width: 850px;
  }

  .divider {
    width: 60px; height: 3px;
    background: #22C55E; border-radius: 2px;
    margin-bottom: 28px;
  }

  .attribution {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800; font-size: 22px;
    color: #0F172A;
    margin-bottom: 6px;
  }

  .role {
    font-family: 'Roboto', sans-serif;
    font-size: 18px;
    color: #64748B;
  }

  .brand-watermark {
    position: absolute;
    bottom: 36px; left: 48px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700; font-size: 16px;
    color: #CBD5E1;
  }
</style>
</head>
<body>
  <div class="bg-canvas"></div>
  <div class="deco deco-1"></div>
  <div class="deco deco-2"></div>
  <div class="content">
    <div class="quote-mark">"</div>
    <div class="quote-text">8 years ago, I walked into F&B with nothing but passion and 'it'll be fine.' I wish someone had shown me the numbers.</div>
    <div class="divider"></div>
    <div class="attribution">Khang Pham</div>
    <div class="role">Founder, Validator.vn</div>
  </div>
  <div class="brand-watermark">validator.vn</div>
</body>
</html>
