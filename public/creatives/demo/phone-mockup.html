<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 50%, #f1f5f9 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  /* Samsung Galaxy S24 Ultra — ultra-thin bezels, flat edges */
  .phone-container {
    position: relative;
    width: 320px;
    height: 670px;
  }

  .phone-frame {
    position: relative;
    width: 320px;
    height: 670px;
    background: linear-gradient(145deg, #2c2c2c, #1a1a1a);
    border-radius: 28px;
    padding: 6px;
    box-shadow:
      /* Titanium edge highlight */
      0 0 0 1px rgba(120,120,120,0.4),
      0 0 0 2px #1a1a1a,
      /* Depth shadows */
      0 20px 50px rgba(0,0,0,0.30),
      0 8px 16px rgba(0,0,0,0.15),
      /* Inner metallic edge */
      inset 0 0 0 0.5px rgba(80,80,80,0.5);
  }

  /* Power button — right side */
  .phone-frame::before {
    content: '';
    position: absolute;
    right: -2px;
    top: 170px;
    width: 2px;
    height: 44px;
    background: linear-gradient(180deg, #444, #2a2a2a, #444);
    border-radius: 0 1px 1px 0;
  }

  /* Volume buttons — left side */
  .phone-frame::after {
    content: '';
    position: absolute;
    left: -2px;
    top: 140px;
    width: 2px;
    height: 36px;
    background: linear-gradient(180deg, #444, #2a2a2a, #444);
    border-radius: 1px 0 0 1px;
    box-shadow:
      0 52px 0 0 #333; /* Volume down */
  }

  /* Screen — nearly edge-to-edge */
  .phone-screen {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 22px;
    overflow: hidden;
    background: #000;
  }

  /* Samsung punch-hole camera */
  .camera-hole {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 12px;
    height: 12px;
    background: #000;
    border-radius: 50%;
    z-index: 10;
    box-shadow:
      0 0 0 2px rgba(30,30,30,0.8),
      0 0 4px rgba(0,0,0,0.5);
  }

  /* Tiny lens reflection */
  .camera-hole::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 3px;
    width: 4px;
    height: 4px;
    background: radial-gradient(circle, rgba(60,80,120,0.4), transparent);
    border-radius: 50%;
  }

  /* Screenshot image */
  .phone-screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
    display: block;
  }

  /* Label */
  .label {
    text-align: center;
    margin-top: 18px;
    font-size: 13px;
    font-weight: 600;
    color: #475569;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
  <div>
    <div class="phone-container">
      <div class="phone-frame">
        <div class="phone-screen">
          <div class="camera-hole"></div>
          <img id="screenshot" src="" alt="Mobile screenshot" />
        </div>
      </div>
    </div>
    <p class="label" id="label"></p>
  </div>
</body>
</html>
